<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QAForge Automation Readiness</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 16px; width: 380px; background: #f4f7fb; color: #111; }
    h1 { margin: 0 0 8px; font-size: 20px; }
    p { margin: 0 0 12px; color: #444; line-height: 1.4; }
    button { width: 100%; padding: 10px 12px; border: none; border-radius: 8px; background: #1f6feb; color: white; font-size: 14px; cursor: pointer; }
    button.secondary { background: #fff; color: #1f3853; border: 1px solid #d5d9e0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .card { background: white; border: 1px solid #dfe3ea; border-radius: 15px; padding: 14px; margin-top: 12px; }
    .status { display: flex; align-items: center; justify-content: space-between; }
    .score { font-size: 28px; font-weight: 700; color: #0b4a95; }
    .tag { background: #eef2ff; color: #0b4a95; padding: 4px 8px; border-radius: 999px; font-size: 12px; }
    .section-title { margin: 0 0 10px; font-size: 14px; color: #2e3559; }
    .list { padding-left: 18px; margin: 0; color: #3d436d; }
    .list li { margin-bottom: 6px; }
    .locator-preview { font-family: monospace; background: #f3f5f8; padding: 10px; border-radius: 10px; color: #15191f; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>QAForge</h1>
  <p>Automation Readiness Analyzer for any webpage. Scan and understand how testable the page is.</p>
  <button id="scanButton">Scan Page</button>
  <button id="activateButton" class="secondary">Activate Locator Mode</button>

  <div id="analysisContainer"></div>
  <div id="elementContainer"></div>

  <script type="module" src="src/popup/popup.js"></script>
</body>
</html>
